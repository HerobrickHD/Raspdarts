<div id="raspdarts-modal-root">
  <div id="raspdarts-overlay">
    <div id="raspdarts-modal">
      <div id="raspdarts-header">
        <span id="raspdarts-title">
          <img src="icons/button.png" width="24" height="24" alt="Raspdarts">
          Raspdarts
        </span>
        <button id="raspdarts-close" aria-label="Schließen">✕</button>
      </div>

      <div id="raspdarts-error" class="raspdarts-hidden">
        Raspberry Pi unreachable — are you on the right network?
      </div>

      <div id="raspdarts-content">
        <div id="raspdarts-cards">
          <div class="raspdarts-card" id="card-cpu">
            <div class="raspdarts-card-label">CPU</div>
            <div class="raspdarts-card-value raspdarts-skeleton">--</div>
          </div>
          <div class="raspdarts-card" id="card-ram">
            <div class="raspdarts-card-label">RAM</div>
            <div class="raspdarts-card-value raspdarts-skeleton">--</div>
          </div>
          <div class="raspdarts-card" id="card-temp">
            <div class="raspdarts-card-label">Temperature</div>
            <div class="raspdarts-card-value raspdarts-skeleton">--</div>
          </div>
          <div class="raspdarts-card" id="card-uptime">
            <div class="raspdarts-card-label">Uptime</div>
            <div class="raspdarts-card-value raspdarts-skeleton">--</div>
          </div>
        </div>

        <div class="raspdarts-section">
          <div class="raspdarts-section-title">
            Autodarts
            <button class="raspdarts-trash-btn" id="btn-autodarts-uninstall" disabled title="Uninstall Autodarts">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="14" height="14">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </div>
          <div class="raspdarts-version">Version: <span id="raspdarts-version">--</span></div>
          <div class="raspdarts-autodarts-buttons">
            <button class="raspdarts-btn raspdarts-btn-primary" id="btn-autodarts-update" disabled>
              <span class="raspdarts-btn-text">...</span>
              <span class="raspdarts-spinner raspdarts-hidden"></span>
            </button>
            <button class="raspdarts-btn raspdarts-btn-secondary raspdarts-hidden" id="btn-autodarts-monitor">
              Monitor
            </button>
          </div>
        </div>

        <div class="raspdarts-section">
          <div class="raspdarts-section-title">
            Raspberry Pi
            <button class="raspdarts-trash-btn" id="btn-system-uninstall" disabled title="Uninstall Raspdarts">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="14" height="14">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </div>
          <div class="raspdarts-version">Raspdarts: <span id="raspdarts-manager-version">--</span></div>
          <button class="raspdarts-btn raspdarts-btn-primary raspdarts-btn-full" id="btn-system-update" disabled>
            <span class="raspdarts-btn-text">...</span>
            <span class="raspdarts-spinner raspdarts-hidden"></span>
          </button>
          <div class="raspdarts-power-buttons">
            <button class="raspdarts-btn raspdarts-btn-warning" id="btn-reboot" disabled>Restart</button>
            <button class="raspdarts-btn raspdarts-btn-danger" id="btn-shutdown" disabled>Shut down</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
